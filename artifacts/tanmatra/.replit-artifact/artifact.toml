kind = "web"
previewPath = "/"
title = "Tanmatra"
version = "1.0.0"
id = "artifacts/tanmatra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24926

[services.development]
run = "pnpm --filter @workspace/tanmatra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tanmatra", "run", "build" ]
publicDir = "artifacts/tanmatra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24926"
BASE_PATH = "/"
