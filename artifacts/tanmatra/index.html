    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Baseline Content-Security-Policy.

      Vite's production build emits hashed external <script> and <link>
      tags from /assets, so 'self' is sufficient for script-src / style-src.
      'unsafe-inline' is required on style-src because several runtime
      libraries (sonner toasts, framer-motion, react-day-picker) inject
      inline style attributes; CSS-in-JS is otherwise compiled to an
      external sheet by Vite. We do NOT allow 'unsafe-inline' or
      'unsafe-eval' on script-src — that's the part that actually matters
      for XSS containment.

      img-src allows data: + blob: for chart canvases and avatar uploads,
      and https: for object-storage-served menu photography. connect-src
      allows wss: for the realtime SSE/socket fallback.

      Dev (vite dev server) injects an inline HMR runtime which 'self'
      will reject; that's fine — dev is not a security context, and a
      rejected HMR script just means a hard reload instead of a hot one.
      To suppress dev console noise locally, override via vite plugin.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"
    />
